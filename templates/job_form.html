{% extends 'base.html' %}
{% block title %}{{ 'Edit' if job else 'New' }} Job — Pool Manager{% endblock %}
{% block content %}
<div class="page-header">
  <h1>{{ 'Edit Job' if job else 'Schedule Job' }}</h1>
  <a href="{{ url_for('jobs') }}" class="btn btn-secondary">← Back</a>
</div>
<div class="card">
  <form method="post">
    <div class="field">
      <label>Customer *</label>
      <select name="customer_id" required>
        <option value="">Select customer…</option>
        {% for c in customers %}
        <option value="{{ c.id }}" {% if job and job.customer_id == c.id %}selected{% endif %}>{{ c.name }}</option>
        {% endfor %}
      </select>
    </div>
    <div class="row">
      <div class="field"><label>Job Type *</label><input name="job_type" required value="{{ job.job_type if job else '' }}" placeholder="e.g. Weekly Service, Filter Clean…"></div>
      <div class="field"><label>Scheduled Date</label><input name="scheduled_date" type="date" value="{{ job.scheduled_date if job else '' }}"></div>
    </div>
    <div class="row">
      <div class="field">
        <label>Status</label>
        <select name="status">
          {% for s in ['scheduled','completed','cancelled'] %}
          <option value="{{ s }}" {% if job and job.status == s %}selected{% elif not job and s == 'scheduled' %}selected{% endif %}>{{ s }}</option>
          {% endfor %}
        </select>
      </div>
      <div class="field"><label>Price ($)</label><input name="price" type="number" step="0.01" value="{{ job.price if job else '0' }}"></div>
    </div>
    <div class="field"><label>Notes</label><textarea name="notes" rows="3">{{ job.notes if job else '' }}</textarea></div>
    <button type="submit" class="btn btn-primary">{{ 'Save Changes' if job else 'Schedule Job' }}</button>
  </form>
</div>
{% endblock %}
