{% extends 'base.html' %}
{% block title %}Add Chemical Log — Pool Manager{% endblock %}
{% block content %}
<div class="page-header">
  <h1>{{ 'Edit Log' if log else 'Add Chemical Log' }}</h1>
  <a href="{{ url_for('chemical_logs') }}" class="btn btn-secondary">← Back</a>
</div>
<div class="card">
  <form method="post">
    <div class="row">
      <div class="field">
        <label>Customer *</label>
        <select name="customer_id" required>
          <option value="">Select customer…</option>
          {% for c in customers %}
          <option value="{{ c.id }}" {% if log and log.customer_id == c.id %}selected{% endif %}>{{ c.name }}</option>
          {% endfor %}
        </select>
      </div>
      <div class="field"><label>Date</label><input name="log_date" type="date" value="{{ log.log_date if log else '' }}"></div>
    </div>
    <div class="row">
      <div class="field"><label>pH (ideal: 7.2–7.6)</label><input name="ph" type="number" step="0.1" value="{{ log.ph if log else '' }}"></div>
      <div class="field"><label>Chlorine ppm (ideal: 1–3)</label><input name="chlorine" type="number" step="0.1" value="{{ log.chlorine if log else '' }}"></div>
    </div>
    <div class="row">
      <div class="field"><label>Alkalinity ppm (ideal: 80–120)</label><input name="alkalinity" type="number" step="1" value="{{ log.alkalinity if log else '' }}"></div>
      <div class="field"><label>Cyanuric Acid ppm (ideal: 30–50)</label><input name="cyanuric_acid" type="number" step="1" value="{{ log.cyanuric_acid if log else '' }}"></div>
    </div>
    <div class="field"><label>Notes</label><textarea name="notes" rows="3">{{ log.notes if log else '' }}</textarea></div>
    <button type="submit" class="btn btn-primary">Save Log</button>
  </form>
</div>
{% endblock %}
