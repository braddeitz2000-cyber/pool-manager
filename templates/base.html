<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{% block title %}Pool Manager{% endblock %}</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f0f4f8; color: #1a202c; }
  nav { background: #1a56db; color: white; padding: 0 24px; display: flex; align-items: center; gap: 8px; height: 56px; }
  nav a { color: white; text-decoration: none; padding: 8px 14px; border-radius: 6px; font-size: 15px; }
  nav a:hover, nav a.active { background: rgba(255,255,255,0.2); }
  nav .brand { font-weight: 700; font-size: 18px; margin-right: 16px; }
  .container { max-width: 1100px; margin: 32px auto; padding: 0 20px; }
  .card { background: white; border-radius: 12px; padding: 24px; box-shadow: 0 1px 4px rgba(0,0,0,0.08); margin-bottom: 20px; }
  h1 { font-size: 24px; font-weight: 700; margin-bottom: 20px; }
  h2 { font-size: 18px; font-weight: 600; margin-bottom: 12px; }
  .stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 16px; margin-bottom: 24px; }
  .stat { background: white; border-radius: 12px; padding: 20px 24px; box-shadow: 0 1px 4px rgba(0,0,0,0.08); }
  .stat .label { font-size: 13px; color: #718096; text-transform: uppercase; letter-spacing: .5px; }
  .stat .value { font-size: 32px; font-weight: 700; color: #1a56db; margin-top: 4px; }
  table { width: 100%; border-collapse: collapse; }
  th { text-align: left; padding: 10px 12px; background: #f7fafc; color: #718096; font-size: 13px; text-transform: uppercase; letter-spacing: .4px; border-bottom: 1px solid #e2e8f0; }
  td { padding: 12px; border-bottom: 1px solid #f0f4f8; font-size: 14px; }
  tr:last-child td { border-bottom: none; }
  tr:hover td { background: #f7fafc; }
  .btn { display: inline-block; padding: 8px 18px; border-radius: 8px; font-size: 14px; font-weight: 600; cursor: pointer; text-decoration: none; border: none; }
  .btn-primary { background: #1a56db; color: white; }
  .btn-primary:hover { background: #1648c0; }
  .btn-sm { padding: 5px 12px; font-size: 13px; }
  .btn-danger { background: #fed7d7; color: #c53030; }
  .btn-danger:hover { background: #feb2b2; }
  .btn-secondary { background: #e2e8f0; color: #4a5568; }
  .btn-secondary:hover { background: #cbd5e0; }
  form .field { margin-bottom: 16px; }
  form label { display: block; font-size: 13px; font-weight: 600; margin-bottom: 5px; color: #4a5568; }
  form input, form select, form textarea { width: 100%; padding: 9px 12px; border: 1px solid #e2e8f0; border-radius: 8px; font-size: 14px; }
  form input:focus, form select:focus, form textarea:focus { outline: none; border-color: #1a56db; box-shadow: 0 0 0 3px rgba(26,86,219,.15); }
  form .row { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
  .alert { padding: 12px 16px; border-radius: 8px; margin-bottom: 16px; font-size: 14px; }
  .alert-success { background: #c6f6d5; color: #276749; }
  .alert-info { background: #bee3f8; color: #2a4365; }
  .badge { display: inline-block; padding: 3px 10px; border-radius: 999px; font-size: 12px; font-weight: 600; }
  .badge-scheduled { background: #bee3f8; color: #2a4365; }
  .badge-completed { background: #c6f6d5; color: #276749; }
  .badge-cancelled { background: #fed7d7; color: #c53030; }
  .page-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
</style>
</head>
<body>
<nav>
  <span class="brand">🏊 Pool Manager</span>
  <a href="{{ url_for('dashboard') }}" {% if request.endpoint == 'dashboard' %}class="active"{% endif %}>Dashboard</a>
  <a href="{{ url_for('customers') }}" {% if 'customer' in request.endpoint %}class="active"{% endif %}>Customers</a>
  <a href="{{ url_for('jobs') }}" {% if 'job' in request.endpoint %}class="active"{% endif %}>Jobs</a>
  <a href="{{ url_for('chemical_logs') }}" {% if 'chemical' in request.endpoint %}class="active"{% endif %}>Chemical Logs</a>
  <a href="{{ url_for('assistant') }}" {% if request.endpoint == 'assistant' %}class="active"{% endif %}>AI Assistant</a>
</nav>
<div class="container">
  {% with messages = get_flashed_messages(with_categories=true) %}
    {% for category, msg in messages %}
      <div class="alert alert-{{ category }}">{{ msg }}</div>
    {% endfor %}
  {% endwith %}
  {% block content %}{% endblock %}
</div>
</body>
</html>
