{% extends 'base.html' %}
{% block title %}AI Assistant — Pool Manager{% endblock %}
{% block content %}
<h1>AI Assistant (Free Local AI)</h1>
<div class="card" style="max-width:760px">
  <div id="chat" style="height:420px;overflow-y:auto;padding:8px 0;display:flex;flex-direction:column;gap:12px;margin-bottom:16px"></div>
  <div style="display:flex;gap:10px">
    <input id="input" type="text" placeholder="Ask anything about your pool business…" style="flex:1" onkeydown="if(event.key==='Enter')send()">
    <button class="btn btn-primary" onclick="send()">Send</button>
  </div>
</div>
<script>
const chat = document.getElementById('chat');
const input = document.getElementById('input');

function addMsg(text, role) {
  const div = document.createElement('div');
  div.style.cssText = `max-width:85%;padding:10px 14px;border-radius:12px;font-size:14px;line-height:1.5;white-space:pre-wrap;` +
    (role === 'user'
      ? 'align-self:flex-end;background:#1a56db;color:white;border-bottom-right-radius:3px'
      : 'align-self:flex-start;background:#f0f4f8;color:#1a202c;border-bottom-left-radius:3px');
  div.textContent = text;
  chat.appendChild(div);
  chat.scrollTop = chat.scrollHeight;
}

addMsg("Hi! I'm your pool company AI assistant powered by a free local model through Ollama. Ask me about pool chemistry, scheduling, pricing, customer tips, or anything about running your business.", 'assistant');

async function send() {
  const msg = input.value.trim();
  if (!msg) return;
  addMsg(msg, 'user');
  input.value = '';
  const thinking = document.createElement('div');
  thinking.style.cssText = 'align-self:flex-start;background:#f0f4f8;color:#718096;padding:10px 14px;border-radius:12px;font-size:14px;border-bottom-left-radius:3px';
  thinking.textContent = 'Thinking…';
  chat.appendChild(thinking);
  chat.scrollTop = chat.scrollHeight;
  try {
    const res = await fetch('/assistant/chat', {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({message: msg})
    });
    const data = await res.json();
    thinking.remove();
    addMsg(data.reply || data.error, 'assistant');
  } catch(e) {
    thinking.remove();
    addMsg('Error connecting to local AI. Make sure Ollama is running and the model is pulled.', 'assistant');
  }
}
</script>
{% endblock %}
